[tool.ruff]
line-length = 140
target-version = "py310"
src = ["backend"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM"]
ignore = ["B008"]  # FastAPI Depends/File defaults in signatures are idiomatic

[tool.ruff.lint.per-file-ignores]
"backend/app/data/default_jds.py" = ["E501"]  # long-form JD copy

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
addopts = "-q"
